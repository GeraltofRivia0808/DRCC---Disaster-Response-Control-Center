name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install & Build Frontend
        run: |
          if [ -d frontend ]; then
            cd frontend
            npm ci
            npm run build --if-present
            npm test --if-present || true
          else
            echo "No frontend folder; skipping"
          fi

  backend:
    name: Build & Test Backend (if present)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install & Test Backend
        run: |
          if [ -f backend/package.json ]; then
            cd backend
            npm ci
            npm test --if-present || true
          else
            echo "No backend/package.json found; skipping"
          fi
